<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  <g fill="white">
    <!-- Chef hat shape -->
    <ellipse cx="50" cy="35" rx="25" ry="15"/>
    <rect x="30" y="35" width="40" height="25" rx="3"/>
    <circle cx="35" cy="28" r="8"/>
    <circle cx="50" cy="25" r="9"/>
    <circle cx="65" cy="28" r="8"/>
    <!-- Rupee symbol -->
    <text x="50" y="78" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="white">₹</text>
  </g>
</svg>
